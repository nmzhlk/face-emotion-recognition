[tool.black]
line-length = 79
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
  | ml/models
  | ml/notebooks
  | public
)/
'''

[tool.isort]
profile = "black"
line_length = 79
skip = [
    'venv',
    'ml/models',
    'ml/notebooks',
    'app/ui',
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true
exclude = [
    'venv/',
    'ml/',
    'app/ui/',
    'app/config\.py$'
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]