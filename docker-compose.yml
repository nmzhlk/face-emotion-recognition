services:
  db:
    image: gvenzl/oracle-xe
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password123}
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: face-recognition-image
    container_name: face_recognition_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ORA_USER=${ORA_USER:-system}
      - ORA_PASS=${ORA_PASS:-admin}
      - ORA_DSN=db:1521/xepdb1
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-yolo:
    image: face-recognition-image
    container_name: worker_yolo
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
              --queues=yolo_queue,merge_queue 
              --hostname=yolo@%h
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=yolo
    mem_limit: 2g
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-recognizer:
    image: face-recognition-image
    container_name: worker_recognizer
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
              --queues=recognizer_queue,merge_queue 
              --hostname=recognizer@%h
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=recognizer
    mem_limit: 2g
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-emotions:
    image: face-recognition-image
    container_name: worker_emotions
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
              --queues=resnet_queue,merge_queue 
              --hostname=emotions@%h
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=emotions 
    dns:
      - 8.8.8.8
      - 1.1.1.1
    mem_limit: 2g
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped


volumes:
  redis_data:
  minio_data: