version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    container_name: face_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: face_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./ml/models:/app/models  # mount model weights

  worker:
    build: .
    container_name: face_worker
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    restart: unless-stopped
    # concurrency=2 → 2 параллельных воркера (по числу камер / GPU)
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./ml/models:/app/models

volumes:
  redis_data:
