services:
  global-api:
    build: .
    container_name: global-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GLOBAL_TXT_PATH=/data/global_ingest_batches.jsonl
    volumes:
      - global_txt:/data
      # - .:/app # for dev
    command: python -m uvicorn public.main:app --host 0.0.0.0 --port 8000

  edge-daemon:
    build: .
    container_name: edge-daemon
    # for dev
    # volumes:
    #   - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - EDGE_ID=edge-1
      - CAMERA_SOURCES=${CAMERA_SOURCES:-0}
      - GLOBAL_INGEST_URL=${GLOBAL_INGEST_URL:-http://global-api:8000/api/ingest_batch}
      - SECRET_API_KEY=${SECRET_API_KEY:-super_secret_api_key}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - MAX_IN_FLIGHT=${MAX_IN_FLIGHT:-4}
      # Celery worker hostnames
      - WORKER_HOSTNAME=yolo
    command: python -m app.edge_daemon
    depends_on:
      - edge-redis
      - edge-minio
    extra_hosts:
      - "host.docker.internal:host-gateway"

  edge-redis:
    image: redis:7.4-alpine
    container_name: edge-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - edge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  edge-minio:
    image: minio/minio
    container_name: edge-minio
    restart: always
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - edge_minio_data:/data
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"

  worker-yolo:
    build: .
    container_name: worker-yolo
    # for dev
    # volumes:
    #   - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=yolo
      - CELERY_YOLO_CONCURRENCY=${CELERY_YOLO_CONCURRENCY:-2}
    command: >-
      celery -A app.core.celery_app worker --loglevel=info
      --concurrency=${CELERY_YOLO_CONCURRENCY:-2}
      --queues=yolo_queue,merge_queue
      --hostname=yolo@%h
    depends_on:
      - edge-redis
      - edge-minio

  worker-recognizer:
    build: .
    container_name: worker-recognizer
    # for dev
    # volumes:
    #   - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=recognizer
      - CELERY_RECOGNIZER_CONCURRENCY=${CELERY_RECOGNIZER_CONCURRENCY:-2}
    command: >-
      celery -A app.core.celery_app worker --loglevel=info
      --concurrency=${CELERY_RECOGNIZER_CONCURRENCY:-2}
      --queues=recognizer_queue,merge_queue
      --hostname=recognizer@%h
    depends_on:
      - edge-redis
      - edge-minio

  worker-emotions:
    build: .
    container_name: worker-emotions
    # for dev
    # volumes:
    #   - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WORKER_HOSTNAME=emotions
      - CELERY_EMOTIONS_CONCURRENCY=${CELERY_EMOTIONS_CONCURRENCY:-2}
    command: >-
      celery -A app.core.celery_app worker --loglevel=info
      --concurrency=${CELERY_EMOTIONS_CONCURRENCY:-2}
      --queues=resnet_queue,merge_queue
      --hostname=emotions@%h
    depends_on:
      - edge-redis
      - edge-minio


volumes:
  global_txt:
  edge_redis_data:
  edge_minio_data:

